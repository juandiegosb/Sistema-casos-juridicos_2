spring.application.name=legal_cases

# Puerto fijo de la aplicacion
server.port=8080

#Para probar sin crear la bd todavia
spring.datasource.url=jdbc:h2:mem:legal_cases
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuracion JWT

# Esta es la clave para firmar los tokens
app.jwt.secret=legal-cases-secret-key-development-123456789
# El tiempo de expiracion del token (milisegundos)
app.jwt.expiration-ms=3600000