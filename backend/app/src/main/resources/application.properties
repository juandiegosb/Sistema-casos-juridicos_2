spring.application.name=legal_cases

# Puerto de la aplicacion 
server.port=${PORT:8080}

# Supabase PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres?sslmode=require&currentSchema=%22DB_consultorioJuridico%22}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres.jgymnvszuzkgsrumyhpo}
spring.datasource.password=${DB_PASSWORD:CasosJuridicos01}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=${DB_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Schema por defecto
spring.jpa.properties.hibernate.default_schema="DB_consultorioJuridico"
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

# Configuracion JWT
app.jwt.secret=${JWT_SECRET:legal-cases-secret-key-development-123456789}
app.jwt.expiration-ms=3600000

# Configuracion de cookie JWT
# En despliegues frontend/backend cross-site se requiere SameSite=None y Secure=true.
# Para desarrollo local por HTTP se puede usar AUTH_COOKIE_SECURE=false y AUTH_COOKIE_SAME_SITE=Lax.
app.auth.cookie.secure=${AUTH_COOKIE_SECURE:true}
app.auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:None}

# Configuracion de correo para restablecer passwords
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false

# Timeouts SMTP para evitar que Railway quede esperando demasiado
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Datos del backend para correos
app.mail.from-name=Consultorio Juridico
app.mail.app-name=Consultorio Juridico

# app real en prod
app.frontend.reset-password-url=${FRONTEND_URL:http://localhost:3000}/restablecer-password
app.password-reset.expiration-minutes=15

# Archivos (por definir si usar volumes aparte?)
file.upload-dir=${UPLOAD_DIR:uploads}