spring.application.name=legal_cases

# Puerto fijo de la aplicacion
server.port=8080

#Para probar sin crear la bd todavia
spring.datasource.url=jdbc:h2:mem:legal_cases
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuracion JWT

# Esta es la clave para firmar los tokens
app.jwt.secret=legal-cases-secret-key-development-123456789
# El tiempo de expiracion del token (milisegundos)
app.jwt.expiration-ms=3600000

# Configuracion de correo para restablecer passwords

# Protocolo para enviar correos
spring.mail.host=smtp.gmail.com  
spring.mail.port=587
spring.mail.username=consultorio.info01@gmail.com
spring.mail.password=evlb cuxw wqmo ddds
spring.mail.properties.mail.smtp.auth=true
# Habilita el TLS para enviar correos de forma segura
spring.mail.properties.mail.smtp.starttls.enable=true

# Expira en 15 min y redirige a esta url del frontend para restablecer password
app.frontend.reset-password-url=http://localhost:3000/restablecer-password
app.password-reset.expiration-minutes=15